name: agrovet_ai
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # --- Base de Datos y Estado ---
  supabase_flutter: ^2.12.0
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1

  # --- Almacenamiento Local (Hive) ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # --- Utilidades y UI ---
  fluttertoast: ^9.0.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  app_links: ^6.4.1
  logger: ^2.6.2
  connectivity_plus: ^6.0.3
  uuid: ^4.5.3
  
  # --- Notificaciones y Animaciones (Nuevas) ---
  flutter_local_notifications: ^18.0.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # --- Generación de Código ---
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - lib/images/logo.webp
    - lib/images/icon.webp
    - lib/images/Taureau.webp
    - lib/l10n/es.json
    - lib/l10n/en.json